---
# This workflow runs tests that require Docker images to be built first
name: Docker E2E Tests
permissions: {}
"on":
  workflow_call:
    inputs:
      image-tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Docker image tag to use for tests (e.g., v1.2.3, pr-123, sha-abc123)"
        required: true
        type: string

jobs:
  docker-tests:
    permissions:
      contents: read
      packages: read
    name: Docker E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: set up go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: ./test/docker-e2e/go.mod
          cache-dependency-path: "**/go.sum"
      - name: Install just
        uses: extractions/setup-just@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pre-pull Docker images
        run: |
          pull_with_retry() {
            local image="$1"
            for attempt in 1 2 3 4 5; do
              if docker pull "$image"; then
                return 0
              fi
              sleep $((attempt * 10))
            done
            docker pull "$image"
          }

          pull_with_retry ghcr.io/celestiaorg/celestia-app:v5.0.2
          pull_with_retry ghcr.io/celestiaorg/celestia-node:v0.25.3
          pull_with_retry ghcr.io/${{ github.repository_owner }}/ev-node-testapp:${{ inputs.image-tag }}
      - name: Run Docker E2E Tests
        run: just test-docker-e2e
        env:
          EV_NODE_IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/ev-node-testapp
          EV_NODE_IMAGE_TAG: ${{ inputs.image-tag }}

  docker-upgrade-tests:
    name: Docker Upgrade E2E Tests
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: set up go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: ./test/docker-e2e/go.mod
          cache-dependency-path: "**/go.sum"
      - name: Install just
        uses: extractions/setup-just@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pre-pull Docker images
        run: |
          pull_with_retry() {
            local image="$1"
            for attempt in 1 2 3 4 5; do
              if docker pull "$image"; then
                return 0
              fi
              sleep $((attempt * 10))
            done
            docker pull "$image"
          }

          pull_with_retry ghcr.io/celestiaorg/celestia-app:v5.0.2
          pull_with_retry ghcr.io/celestiaorg/celestia-node:v0.25.3
          pull_with_retry ghcr.io/evstack/ev-reth:v0.2.2
          pull_with_retry ghcr.io/evstack/ev-node-evm:main
          pull_with_retry ghcr.io/${{ github.repository_owner }}/ev-node-evm:${{ inputs.image-tag }}
      - name: Run Docker Upgrade E2E Tests
        run: just test-docker-upgrade-e2e
        env:
          EVM_IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/ev-node-evm
          EVM_NODE_IMAGE_TAG: ${{ inputs.image-tag }}

  test-docker-compat:
    name: Docker Compatibility E2E Tests
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: set up go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: ./test/docker-e2e/go.mod
          cache-dependency-path: "**/go.sum"
      - name: Install just
        uses: extractions/setup-just@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pre-pull Docker images
        run: |
          pull_with_retry() {
            local image="$1"
            for attempt in 1 2 3 4 5; do
              if docker pull "$image"; then
                return 0
              fi
              sleep $((attempt * 10))
            done
            docker pull "$image"
          }

          pull_with_retry ghcr.io/celestiaorg/celestia-app:v5.0.2
          pull_with_retry ghcr.io/celestiaorg/celestia-node:v0.25.3
          pull_with_retry ghcr.io/evstack/ev-reth:v0.2.2
          pull_with_retry ghcr.io/${{ github.repository_owner }}/ev-node-evm:main
          pull_with_retry ghcr.io/${{ github.repository_owner }}/ev-node-evm:${{ inputs.image-tag }}
      - name: Run Docker Compat E2E Tests
        run: just test-docker-compat
        env:
          SEQUENCER_EVM_IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/ev-node-evm
          SEQUENCER_EVM_IMAGE_TAG: main # TODO: set this to the last released tag
          FULLNODE_EVM_IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/ev-node-evm
          FULLNODE_EVM_IMAGE_TAG: ${{ inputs.image-tag }}
