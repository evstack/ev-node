---
name: CI
"on":
  push:
    branches:
      - main
  pull_request:
  merge_group:

permissions: {}
jobs:
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      loadgen: ${{ steps.filter.outputs.loadgen }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!.github/workflows/docs_*.yml'
            loadgen:
              - 'apps/loadgen/**'
              - '.just/bench.just'
              - '.just/build.just'
              - '.github/workflows/ci.yml'
              - '.github/workflows/docker-build-push.yml'

  determine-image-tag:
    name: Determine Image Tag
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - name: Set image tag
        id: set-tag
        run: |
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            TAG="pr-${{ github.event.pull_request.number }}"
            echo "::notice::Using PR-based tag: $TAG"
          else
            # Sanitize ref_name by replacing / with -
            TAG="${{ github.ref_name }}"
            TAG="${TAG//\//-}"
            echo "::notice::Using branch/tag-based tag: $TAG"
          fi

          # Validate tag format
          if [[ ! "$TAG" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "::error::Invalid image tag format: $TAG"
            exit 1
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT

  determine-docker-apps:
    name: Determine Docker Apps
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      apps: ${{ steps.set-apps.outputs.apps }}
    steps:
      - name: Set docker app matrix
        id: set-apps
        run: |
          APPS='[
            {"name": "ev-node-evm", "dockerfile": "apps/evm/Dockerfile"},
            {"name": "ev-node-grpc", "dockerfile": "apps/grpc/Dockerfile"},
            {"name": "ev-node-testapp", "dockerfile": "apps/testapp/Dockerfile"}
          ]'

          if [ "${{ github.event_name }}" = "push" ] || [ "${{ needs.changes.outputs.loadgen }}" = "true" ]; then
            APPS='[
              {"name": "ev-node-evm", "dockerfile": "apps/evm/Dockerfile"},
              {"name": "ev-node-grpc", "dockerfile": "apps/grpc/Dockerfile"},
              {"name": "ev-node-loadgen", "dockerfile": "apps/loadgen/Dockerfile"},
              {"name": "ev-node-testapp", "dockerfile": "apps/testapp/Dockerfile"}
            ]'
          fi

          {
            echo "apps<<EOF"
            echo "$APPS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/lint.yml

  docker:
    needs: [determine-image-tag, determine-docker-apps, changes]
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/docker-build-push.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
    with:
      image-tag: ${{ needs.determine-image-tag.outputs.tag }}
      apps: ${{ needs.determine-docker-apps.outputs.apps }}

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    permissions:
      actions: read
      contents: read
      packages: read
    uses: ./.github/workflows/test.yml
    secrets: inherit

  docker-tests:
    needs: [determine-image-tag, docker, changes]
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/docker-tests.yml
    secrets: inherit
    permissions:
      contents: read
    with:
      image-tag: ${{ needs.determine-image-tag.outputs.tag }}

  proto:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/proto.yml
