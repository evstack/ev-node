name: Release
on:
  push:
    tags:
      - '**/v*.*.*'  # Matches tags like evm/single/v0.2.0, testapp/v0.4.0, etc.

permissions: {}

jobs:
  generate-changelog:
    name: Generate Changelog and Create Release Branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changelog: ${{ steps.cliff.outputs.content }}
      release-branch: ${{ steps.create-branch.outputs.branch-name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history needed for changelog generation

      - name: Get previous tag
        id: get-prev-tag
        run: |
          # Get the previous tag
          CURRENT_TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^${CURRENT_TAG}$" | tail -1)

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            echo "No previous tag found, using initial commit"
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "prev-tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "::notice::Comparing $PREV_TAG to $CURRENT_TAG"

      - name: Generate git diff
        id: git-diff
        run: |
          PREV_TAG="${{ steps.get-prev-tag.outputs.prev-tag }}"
          CURRENT_TAG="${{ github.ref_name }}"

          # Generate detailed diff with file statistics
          git diff --stat "$PREV_TAG"..HEAD > git-diff-stats.txt
          git log --oneline "$PREV_TAG"..HEAD > git-commits.txt
          git diff "$PREV_TAG"..HEAD > git-full-diff.txt

          echo "Generated git diff from $PREV_TAG to HEAD"
          echo "Commit summary:"
          cat git-commits.txt

          # Capture outputs for next step (truncate diff to fit GitHub limits)
          {
            echo 'commits<<EOF_COMMITS'
            cat git-commits.txt
            echo EOF_COMMITS
          } >> $GITHUB_OUTPUT

          {
            echo 'stats<<EOF_STATS'
            cat git-diff-stats.txt
            echo EOF_STATS
          } >> $GITHUB_OUTPUT

          {
            echo 'diff<<EOF_DIFF'
            head -c 50000 git-full-diff.txt
            echo EOF_DIFF
          } >> $GITHUB_OUTPUT

      - name: Generate changelog with Claude
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are a technical writer creating release notes for a blockchain node software project called ev-node.
            Analyze the provided git changes and generate a clear, comprehensive changelog in markdown format.

            Follow these guidelines:
            - Start with a brief summary of the release
            - Group changes by category: Features, Bug Fixes, Performance, Documentation, etc.
            - Use clear, concise bullet points
            - Highlight breaking changes prominently if any
            - Include technical details that would help developers understand the changes
            - Format as clean markdown suitable for a GitHub release


            Generate a changelog for this release based on the following git changes:

            ## Commits:
            ```
            ${{ steps.git-diff.outputs.commits }}
            ```

            ## File Statistics:
            ```
            ${{ steps.git-diff.outputs.stats }}
            ```

            ## Full Diff (first 50000 chars):
            ```diff
            ${{ steps.git-diff.outputs.diff }}
            ```

            Please generate a well-formatted changelog in markdown that summarizes these changes for users and developers.

      - name: Save changelog output
        id: changelog-output
        run: |
          # Save Claude's response to file
          echo "${{ steps.claude.outputs.content }}" > RELEASE_CHANGELOG.md
          echo "Generated changelog with Claude AI:"
          cat RELEASE_CHANGELOG.md

          # Export for GitHub Release (escape for multiline output)
          {
            echo 'content<<EOF'
            cat RELEASE_CHANGELOG.md
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Create release branch
        id: create-branch
        run: |
          TAG="${{ github.ref_name }}"
          BRANCH_NAME="release/$TAG"

          echo "Creating release branch: $BRANCH_NAME"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH_NAME"

          # Update CHANGELOG.md with the generated content
          if [ -f "CHANGELOG.md" ]; then
            # Add generated changelog to CHANGELOG.md
            cat RELEASE_CHANGELOG.md >> CHANGELOG_RELEASE_NOTES.md
            echo "Changelog prepared for release: $TAG" >> CHANGELOG_RELEASE_NOTES.md
          fi

          # Commit the changelog
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: prepare release $TAG" \
              -m "Generated changelog for $TAG release." \
              -m "This is an automated commit created by the release workflow."
          fi

          # Push the branch
          git push origin "$BRANCH_NAME"

          echo "branch-name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "::notice::Created release branch: $BRANCH_NAME"

  parse-tag:
    name: Parse Release Tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      app-path: ${{ steps.parse.outputs.app-path }}
      version: ${{ steps.parse.outputs.version }}
      image-name: ${{ steps.parse.outputs.image-name }}
      dockerfile: ${{ steps.parse.outputs.dockerfile }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Parse tag and validate app
        id: parse
        run: |
          TAG="${{ github.ref_name }}"
          echo "Processing tag: $TAG"

          # Extract version (everything after the last /)
          VERSION="${TAG##*/}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Extract app path (everything before the last /)
          APP_PATH="${TAG%/*}"
          echo "app-path=$APP_PATH" >> $GITHUB_OUTPUT

          # Check if the app directory exists in ./apps/
          if [ ! -d "apps/$APP_PATH" ]; then
            echo "::error::App directory 'apps/$APP_PATH' does not exist"
            exit 1
          fi

          # Check if Dockerfile exists
          if [ ! -f "apps/$APP_PATH/Dockerfile" ]; then
            echo "::error::Dockerfile not found in 'apps/$APP_PATH/'"
            exit 1
          fi

          echo "dockerfile=apps/$APP_PATH/Dockerfile" >> $GITHUB_OUTPUT

          # Generate image name from app path (replace / with -)
          IMAGE_NAME="ev-node-${APP_PATH//\//-}"
          echo "image-name=$IMAGE_NAME" >> $GITHUB_OUTPUT

          echo "::notice::Building $IMAGE_NAME version $VERSION from apps/$APP_PATH"

  build-and-push:
    name: Build and Push Docker Image
    needs: parse-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ needs.parse-tag.outputs.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ needs.parse-tag.outputs.image-name }}:${{ needs.parse-tag.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ needs.parse-tag.outputs.image-name }}:latest

  create-github-release:
    name: Create GitHub Release
    needs: [generate-changelog, parse-tag, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## ${{ needs.parse-tag.outputs.image-name }} ${{ needs.parse-tag.outputs.version }}

            **⚠️ This is a draft release. Please update the following before publishing:**

            - [ ] Add **Upgrade Priority** (Critical/High/Medium/Low)
            - [ ] Add **General Description** of the release
            - [ ] Review and refine the **Changelog** below
            - [ ] Document **Tested Upgrade Paths** (which versions were tested in E2E)
            - [ ] Verify Docker images are available
            - [ ] Publish announcements in Slack and Telegram after publishing

            ---

            ### Changelog

            ${{ needs.generate-changelog.outputs.changelog }}

            ---

            ### Docker Images

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/${{ needs.parse-tag.outputs.image-name }}:${{ needs.parse-tag.outputs.version }}
            docker pull ghcr.io/${{ github.repository_owner }}/${{ needs.parse-tag.outputs.image-name }}:latest
            ```

            ### Release Branch

            A release branch has been created for your review: `${{ needs.generate-changelog.outputs.release-branch }}`

            You can checkout this branch to make edits to the changelog before merging.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
